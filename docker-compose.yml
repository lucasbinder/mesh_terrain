services:
  mesh-terrain:
    build:
      context: .
      dockerfile: Dockerfile
    image: mesh-terrain:latest
    ports:
      - "5151:80"
    environment:
      APP_RUNTIME_MODE: "production"
      DASH_DEBUG: "0"
      APP_PORT: "80"
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
      GUNICORN_TIMEOUT: "300"
    restart: unless-stopped

  mesh-terrain-debug:
    build:
      context: .
      dockerfile: Dockerfile
    image: mesh-terrain:debug
    profiles: ["debug"]
    ports:
      - "5151:80"
    volumes:
      - ./app.py:/app/app.py
      - ./assets:/app/assets
    environment:
      APP_RUNTIME_MODE: "debug"
      DASH_DEBUG: "1"
      APP_HOST: "0.0.0.0"
      APP_PORT: "80"
    restart: unless-stopped
